version: '3.8'

# ============================================
# Poker Server Modern - Development Environment
# ============================================
# 
# USAGE:
#   cp ../../.env.example ../../.env
#   # Edit .env with your secure passwords
#   docker-compose -f docker-compose.dev.yml up -d
#
# IMPORTANT:
#   - Change all password values in .env before any deployment
#   - Redis Commander is for development only, do NOT expose in production
#   - For production, use kubernetes with proper secrets management

services:
  # 后端API服务
  server:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.server
    container_name: poker-server
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-poker}?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-dev-secret-key-must-change-in-prod}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-dev-refresh-secret-must-change-in-prod}
      - SNAPSHOT_SECRET=${SNAPSHOT_SECRET:-dev-snapshot-secret-change-in-prod}
      - LOG_LEVEL=debug
    volumes:
      - ../../apps/server/src:/app/apps/server/src
      - ../../packages:/app/packages
      - /app/node_modules
    command: npm run dev --workspace=@poker/server
    networks:
      - poker-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 前端开发服务器
  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
    container_name: poker-web
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
      - VITE_WS_URL=ws://localhost:3000
    volumes:
      - ../../apps/web/src:/app/apps/web/src
      - ../../packages:/app/packages
      - /app/node_modules
    command: npm run dev --workspace=@poker/web
    networks:
      - poker-network
    restart: unless-stopped
    depends_on:
      - server

  # PostgreSQL数据库
  postgres:
    image: postgres:16-alpine
    container_name: poker-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-poker}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - poker-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=512MB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=4MB
      -c min_wal_size=1GB
      -c max_wal_size=4GB

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: poker-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - poker-network
    restart: unless-stopped
    command: >
      redis-server
      -requirepass ${REDIS_PASSWORD:-}
      -maxmemory 256mb
      -maxmemory-policy allkeys-lru
      -appendonly yes
      -appendfsync everysec
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Commander (开发环境Redis管理界面)
  # IMPORTANT: 仅用于本地开发！不要在生产环境暴露此端口
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: poker-redis-commander
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
      - REDIS_AUTH=${REDIS_PASSWORD:-}
    depends_on:
      - redis
    networks:
      - poker-network
    # 仅在开发环境运行
    profiles:
      - development

volumes:
  postgres_data:
  redis_data:

networks:
  poker-network:
    driver: bridge
